<!-- Cambios en el HTML -->
<div class="chat">
  <h2>✨ SOSI Antonio Ocampo</h2>

  <!-- area de respuestas: role + aria-live para accesibilidad -->
  <div id="respuesta" role="log" aria-live="polite"></div>

  <div class="input-group">
    <!-- label para accesibilidad -->
    <label for="mensaje" class="sr-only" style="position:absolute;left:-9999px">Mensaje</label>
    <input id="mensaje" type="text" placeholder="Escribe tu mensaje..." autocomplete="off" />
    <button id="enviarBtn" type="button">Enviar</button>
  </div>
</div>

<style>
  /* añadir box-sizing y usar min-height */
  * { box-sizing: border-box; }
  #respuesta {
    min-height: 200px;
    max-height: 350px;
    overflow-y: auto;
    ...
  }
  /* .sr-only estilo para pantalla accesible */
  .sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0,0,0,0); white-space: nowrap; border: 0; }
</style>

<script>
document.addEventListener('DOMContentLoaded', () => {
  const mensajeInput = document.getElementById('mensaje');
  const btn = document.getElementById('enviarBtn');
  const respDiv = document.getElementById('respuesta');

  // manejar Enter (keydown)
  mensajeInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') {
      e.preventDefault();
      enviar();
    }
  });

  btn.addEventListener('click', enviar);

  async function enviar() {
    const mensaje = mensajeInput.value.trim();
    if (!mensaje) return;

    btn.disabled = true;
    const originalBtnText = btn.textContent;
    btn.textContent = '...';

    try {
      const r = await fetch('/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ mensaje })
      });

      if (!r.ok) {
        // manejo de errores HTTP
        const text = await r.text();
        appendLine('Error del servidor: ' + r.status + ' ' + r.statusText + (text ? ' — ' + text : ''));
      } else {
        // parseo seguro: si no es JSON, lo tratamos como texto
        let data;
        try {
          data = await r.json();
        } catch {
          data = { respuesta: await r.text() };
        }
        appendPair('Tú', mensaje);
        appendPair('SOSI Antonio Ocampo', data.respuesta);
      }
    } catch (error) {
      appendLine('Error: No se pudo conectar al servidor.');
      console.error(error);
    } finally {
      mensajeInput.value = '';
      btn.disabled = false;
      btn.textContent = originalBtnText;
      respDiv.scrollTop = respDiv.scrollHeight;
      mensajeInput.focus();
    }
  }

  // funciones auxiliares que usan textContent para evitar XSS
  function appendLine(text) {
    const p = document.createElement('div');
    p.textContent = text;
    p.style.marginBottom = '10px';
    respDiv.appendChild(p);
    const hr = document.createElement('hr');
    hr.style.border = '0';
    hr.style.borderTop = '1px solid #334155';
    respDiv.appendChild(hr);
  }

  function appendPair(author, message) {
    const authorEl = document.createElement('div');
    authorEl.innerHTML = '<b>' + escapeHtml(author) + ':</b>';
    const msgEl = document.createElement('div');
    msgEl.textContent = message;
    msgEl.style.marginBottom = '10px';
    respDiv.appendChild(authorEl);
    respDiv.appendChild(msgEl);
    const hr = document.createElement('hr');
    respDiv.appendChild(hr);
  }

  // escapado mínimo para autor (si lo necesitas)
  function escapeHtml(str) {
    return String(str).replace(/[&<>"']/g, (s) => ({
      '&': '&amp;',
      '<': '&lt;',
      '>': '&gt;',
      '"': '&quot;',
      "'": '&#39;'
    })[s]);
  }
});
</script>
