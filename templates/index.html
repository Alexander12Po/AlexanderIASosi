
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SOSI Antonio Ocampo</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        body { background: #050505; color: #ececec; height: 100dvh; display: flex; flex-direction: column; }

        /* Header */
        .header { height: 60px; display: flex; align-items: center; justify-content: center; font-weight: 600; border-bottom: 1px solid #222; background: #0a0a0a; color: #fff; }

        /* Área de Chat */
        #chat { flex: 1; overflow-y: auto; padding: 20px; display: none; display: flex; flex-direction: column; }
        
        .msg { padding: 12px 16px; border-radius: 18px; margin-bottom: 15px; max-width: 85%; font-size: 15px; line-height: 1.5; word-wrap: break-word; }
        
        /* Estilo Gemini-like */
        .user { align-self: flex-end; background: #333; color: white; border-top-right-radius: 4px; }
        .bot { align-self: flex-start; background: #1a1a1a; color: #ececec; border: 1px solid #333; border-top-left-radius: 4px; }
        
        /* Código en mensajes */
        pre { background: #000; padding: 10px; border-radius: 8px; overflow-x: auto; margin: 10px 0; color: #ff8888; }
        code { font-family: monospace; }

        /* Pantalla inicial con logo */
        #home { flex: 1; display: flex; align-items: center; justify-content: center; flex-direction: column; }
        .logo { width: 140px; height: 140px; border-radius: 50%; border: 3px solid #ff2d2d; overflow: hidden; margin-bottom: 20px; }
        .logo img { width: 100%; height: 100%; object-fit: cover; }

        /* Footer / Input */
        .footer { padding: 15px; background: #050505; border-top: 1px solid #222; display: flex; gap: 10px; align-items: center; }
        #mensaje { flex: 1; height: 50px; background: #121212; border: 1px solid #333; border-radius: 25px; padding: 0 20px; color: white; outline: none; font-size: 16px; }
        .send-btn { width: 50px; height: 50px; border-radius: 50%; border: none; cursor: pointer; background: #ff2d2d; color: white; display: flex; align-items: center; justify-content: center; font-size: 20px; }
        
        /* Indicador de cargando */
        .loading { font-style: italic; color: #888; padding: 10px; }
    </style>
</head>
<body>

    <div class="header">🤖 SOSI Antonio Ocampo</div>

    <div id="home">
        <div class="logo">
            <img src="https://i.postimg.cc/XYHn0q10/original-8e5ab17483c1b360c713dd7ac11dccf7-2.jpg" alt="Logo">
        </div>
    </div>

    <div id="chat"></div>

    <div class="footer">
        <input type="text" id="mensaje" placeholder="Escribe un mensaje..." onkeydown="if(event.key==='Enter') enviar()">
        <button class="send-btn" onclick="enviar()">➤</button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script>
        async function enviar() {
            const input = document.getElementById("mensaje");
            const texto = input.value.trim();
            const home = document.getElementById("home");
            const chat = document.getElementById("chat");

            if(!texto) return;

            home.style.display = "none";
            chat.style.display = "flex";

            chat.innerHTML += `<div class="msg user">${texto}</div>`;
            input.value = "";

            // Indicador de "respondiendo..."
            const loadingId = "loading-" + Date.now();
            chat.innerHTML += `<div class="msg bot loading" id="${loadingId}">SOSI está respondiendo...</div>`;
            chat.scrollTop = chat.scrollHeight;

            const formData = new FormData();
            formData.append("mensaje", texto);

            try {
                const res = await fetch("/chat", { method: "POST", body: formData });
                const data = await res.json();
                
                // Eliminar indicador y añadir respuesta
                document.getElementById(loadingId).remove();
                chat.innerHTML += `<div class="msg bot">${marked.parse(data.respuesta)}</div>`;
            } catch (e) {
                document.getElementById(loadingId).remove();
                chat.innerHTML += `<div class="msg bot">Error al conectar con el servidor.</div>`;
            }
            chat.scrollTop = chat.scrollHeight;
        }
    </script>
</body>
</html>
