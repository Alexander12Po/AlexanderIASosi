<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SOSI Antonio Ocampo</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
        body { background: #050505; color: #ececec; height: 100dvh; display: flex; flex-direction: column; }
        .header { height: 60px; display: none; align-items: center; padding: 0 15px; border-bottom: 1px solid #222; background: #0a0a0a; font-weight: 600; }
        .header-logo { width: 30px; height: 30px; border-radius: 50%; margin-right: 12px; object-fit: cover; }
        #chat { flex: 1; overflow-y: auto; padding: 20px; display: none; flex-direction: column; }
        .msg { padding: 12px 16px; border-radius: 18px; margin-bottom: 15px; max-width: 85%; font-size: 15px; }
        .user { align-self: flex-end; background: #333; color: white; border-top-right-radius: 4px; }
        .bot { align-self: flex-start; background: #1a1a1a; color: #ececec; border: 1px solid #333; border-top-left-radius: 4px; }
        .premium { border: 1px solid #ff2d2d; color: #ffbcbc; font-weight: bold; text-align: center; }
        #home { flex: 1; display: flex; align-items: center; justify-content: center; flex-direction: column; }
        .logo { width: 140px; height: 140px; border-radius: 50%; border: 3px solid #ff2d2d; overflow: hidden; margin-bottom: 20px; }
        .logo img { width: 100%; height: 100%; object-fit: cover; }
        .footer { padding: 15px; background: #050505; border-top: 1px solid #222; display: flex; gap: 10px; align-items: center; }
        #mensaje { flex: 1; height: 50px; background: #121212; border: 1px solid #333; border-radius: 25px; padding: 0 20px; color: white; outline: none; }
        .send-btn { width: 50px; height: 50px; border-radius: 50%; border: none; cursor: pointer; background: #ff2d2d; color: white; }
    </style>
</head>
<body>
    <div class="header" id="header">
        <img src="https://i.postimg.cc/XYHn0q10/original-8e5ab17483c1b360c713dd7ac11dccf7-2.jpg" class="header-logo">
        <span>SOSI Antonio Ocampo</span>
    </div>
    <div id="home"><div class="logo"><img src="https://i.postimg.cc/XYHn0q10/original-8e5ab17483c1b360c713dd7ac11dccf7-2.jpg"></div></div>
    <div id="chat"></div>
    <div class="footer">
        <input type="text" id="mensaje" placeholder="Escribe un mensaje...">
        <button class="send-btn" id="btnEnviar" onclick="enviar()">➤</button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script>
        let contador = parseInt(localStorage.getItem('contador')) || 0;
        const LIMITE = 5;

        async function enviar() {
            const input = document.getElementById("mensaje");
            const btn = document.getElementById("btnEnviar");
            const texto = input.value.trim();
            const chat = document.getElementById("chat");
            if(!texto || btn.disabled) return;

            document.getElementById("home").style.display = "none";
            document.getElementById("header").style.display = "flex";
            chat.style.display = "flex";

            if (contador >= LIMITE) {
                chat.innerHTML += `<div class="msg bot premium">Se acabaron tus consultas gratuitas.<br>Actualiza a Sosi Premium para seguir chateando sin límites.</div>`;
                input.value = "";
                chat.scrollTop = chat.scrollHeight;
                return;
            }

            btn.disabled = true;
            chat.innerHTML += `<div class="msg user">${texto}</div>`;
            input.value = "";
            
            try {
                const res = await fetch("/chat", { 
                    method: "POST", 
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: "mensaje=" + encodeURIComponent(texto) 
                });
                const data = await res.json();
                chat.innerHTML += `<div class="msg bot">${marked.parse(data.respuesta)}</div>`;
                contador++;
                localStorage.setItem('contador', contador);
            } catch (e) {
                chat.innerHTML += `<div class="msg bot">Error de conexión. Intenta nuevamente en un momento.</div>`;
            } finally {
                btn.disabled = false;
                chat.scrollTop = chat.scrollHeight;
            }
        }
    </script>
</body>
</html>
