<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOSI Antonio Ocampo</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Inter',sans-serif; }
        body { background:#050505; color:white; overflow:hidden; }

        #matrix { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; opacity: 0.3; transition: opacity 0.5s; }

        .chat { height:100vh; display:flex; flex-direction:column; }
        .header { height:70px; display:flex; align-items:center; justify-content:center; font-size:20px; font-weight:600; border-bottom:1px solid #222; background:rgba(0,0,0,0.5); }

        /* Contenedor principal del logo */
        #home { flex:1; display:flex; align-items:center; justify-content:center; flex-direction:column; transition: opacity 0.5s; }
        .logo { width:150px; height:150px; border-radius:50%; border:2px solid #ff2d2d; overflow:hidden; box-shadow: 0 0 20px rgba(255, 45, 45, 0.3); }
        .logo img { width:100%; height:100%; object-fit:cover; }

        #chat { display:none; flex:1; overflow-y:auto; padding:20px; }
        
        .footer { padding:15px; display:flex; gap:10px; background:#0a0a0a; border-top:1px solid #222; align-items:center; }
        #mensaje { flex:1; height:50px; background:#121212; border:1px solid #333; border-radius:25px; padding:0 20px; color:white; outline:none; }
        .upload-btn { width:50px; height:50px; border-radius:50%; border:none; cursor:pointer; background:url('https://i.postimg.cc/rF4nSwtd/original-de2cfebf4f22b8bf554b580a8aa19f07-2.jpg') no-repeat center center; background-size:cover; }
        .send-btn { width:50px; height:50px; border-radius:50%; border:none; cursor:pointer; background:#ff2d2d; color:white; font-size:20px; display:flex; align-items:center; justify-content:center; }
    </style>
</head>
<body>
    <canvas id="matrix"></canvas>
    
    <div class="chat">
        <div class="header">🤖 SOSI Antonio Ocampo</div>
        <div class="home" id="home">
            <div class="logo">
                <img src="https://i.postimg.cc/XYHn0q10/original-8e5ab17483c1b360c713dd7ac11dccf7-2.jpg" alt="Logo">
            </div>
        </div>
        <div id="chat"></div>
        <div class="footer">
            <input type="file" id="imagen" hidden>
            <button class="upload-btn" onclick="document.getElementById('imagen').click()"></button>
            <input type="text" id="mensaje" placeholder="Escribe un mensaje..." onfocus="detenerAnimacion()" onblur="reanudarAnimacion()">
            <button class="send-btn" onclick="enviar()">➤</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('matrix');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        const letters = Array(256).fill(1);
        let animando = true;

        function draw() {
            if (!animando) return;
            ctx.fillStyle = 'rgba(5, 5, 5, 0.05)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#ff0000';
            ctx.font = '15px monospace';
            letters.map((y, i) => {
                const text = String.fromCharCode(0x30A0 + Math.random() * 96);
                ctx.fillText(text, i * 15, y);
                letters[i] = y > 758 + Math.random() * 1e4 ? 0 : y + 15;
            });
        }
        setInterval(draw, 50);

        function detenerAnimacion() { animando = false; }
        function reanudarAnimacion() { animando = true; }

        function enviar() {
            const input = document.getElementById("mensaje");
            const texto = input.value.trim();
            if(!texto) return;

            // Ocultar logo y mostrar chat
            document.getElementById("home").style.display = "none";
            document.getElementById("chat").style.display = "block";
            
            // Aquí puedes agregar tu lógica de envío al servidor
            document.getElementById("chat").innerHTML += `<div style="margin-left:auto; background:#ff2d2d; padding:10px; border-radius:15px; margin-bottom:10px; width:fit-content;">${texto}</div>`;
            input.value = "";
        }
    </script>
</body>
</html>
