<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🥲 SOSI Antonio Ocampo 👾</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #0f172a;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: #f1f5f9;
        }

        .chat {
            width: 90%;
            max-width: 400px;
            background: #1e293b;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            padding: 20px;
            border: 1px solid #334155;
        }

        h2 { text-align: center; color: #38bdf8; margin-top: 0; font-size: 1.4rem; }

        #respuesta {
            height: 350px;
            overflow-y: auto;
            border: 1px solid #334155;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 10px;
            background: #0f172a;
            white-space: pre-wrap;
            font-size: 0.95rem;
            line-height: 1.5;
        }

        .input-group {
            display: flex;
            gap: 5px;
        }

        input {
            flex: 1;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #334155;
            background: #0f172a;
            color: white;
            outline: none;
        }

        button {
            padding: 10px 15px;
            background: #2563eb;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }

        button:hover { background: #1d4ed8; }
        b { color: #38bdf8; }
        hr { border: 0; border-top: 1px solid #334155; margin: 10px 0; }
    </style>
</head>

<body>

<div class="chat">
    <h2>✨ SOSI Antonio Ocampo</h2>

    <div id="respuesta"></div>

    <div class="input-group">
        <input id="mensaje" placeholder="Escribe tu mensaje...">
        <button onclick="enviar()">Enviar</button>
    </div>
</div>

<script>
async function enviar(){
    const mensajeInput = document.getElementById("mensaje");
    const mensaje = mensajeInput.value.trim();
    if (!mensaje) return;

    const btn = document.querySelector('button');
    btn.disabled = true;
    btn.textContent = "...";

    try {
        const r = await fetch("/chat", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ mensaje })
        });

        const data = await r.json();

        const respDiv = document.getElementById("respuesta");
        respDiv.innerHTML += "<b>Tú:</b> " + mensaje + "<br><br>";
        respDiv.innerHTML += "<b>SOSI Antonio Ocampo:</b> " + data.respuesta + "<hr>";
        
        respDiv.scrollTop = respDiv.scrollHeight;
    } catch (error) {
        document.getElementById("respuesta").innerHTML += "<b>Error:</b> No se pudo conectar al servidor.<hr>";
    }

    mensajeInput.value = "";
    btn.disabled = false;
    btn.textContent = "Enviar";
}

document.getElementById("mensaje").addEventListener("keypress", function(event) {
    if (event.key === "Enter") enviar();
});
</script>

</body>
</html>
