<!DOCTYPE html>
<html lang='es'>
<head>
    <meta charset='utf-8'>
    <meta name='viewport' content='width=device-width,initial-scale=1'>
    <title>IA Oscura</title>
    <style>
        *{box-sizing:border-box}body{margin:0;font-family:Segoe UI;background:#0f172a;color:#fff;height:100vh;display:flex;flex-direction:column}
        .header{background:#111827;padding:16px;text-align:center;font-weight:bold;border-bottom:1px solid #334155}
        #chat{flex:1;overflow:auto;padding:18px;background:linear-gradient(#0f172a,#111827)}
        .msg{max-width:80%;padding:14px 16px;border-radius:18px;margin:10px 0;animation:f .25s; line-height: 1.4;}
        .ai{background:#1e293b;border:1px solid #334155}
        .user{background:#2563eb;margin-left:auto}
        .preview img,.preview video{max-width:220px;border-radius:10px}
        .bottom{display:flex;gap:8px;padding:12px;background:#111827;border-top:1px solid #334155}
        .input{flex:1;background:#1e293b;border:1px solid #334155;border-radius:25px;display:flex;align-items:center;padding:6px 10px}
        textarea{flex:1;background:transparent;border:none;color:#fff;outline:none;resize:none; font-family: inherit;}
        textarea::placeholder{color:#94a3b8}
        button{width:44px;height:44px;border:none;border-radius:50%;background:#2563eb;color:#fff; cursor: pointer;}
        @keyframes f{from{opacity:0;transform:translateY(10px)}to{opacity:1}}
    </style>
</head>
<body>
    <div class='header'>✨ Mi Asistente IA</div>
    <div id='chat'><div class='msg ai'>🤖 ¡Hola! Ya estoy conectado. Escribe un mensaje para probar.</div></div>
    
    <input id='file' hidden type='file' multiple accept='image/*,video/*,.pdf,.doc,.docx'>
    
    <div class='bottom'>
        <button onclick='file.click()'>📎</button>
        <button>😊</button>
        <button>🎤</button>
        <div class='input'>
            <textarea id='txt' placeholder='Escribe un mensaje...' rows="1"></textarea>
        </div>
        <button onclick='send()'>➤</button>
    </div>

    <script>
        // 👇 PEGA TU API KEY AQUÍ ABAJO (entre las comillas) 👇
        const API_KEY = 'AQ.Ab8RN6Lc1Z0YxOO_87Afd99_Cj5pP2JxCuHh3VLIQ0Sg2bu82w'; 
        // 👆 ------------------------------------------------ 👆

        const c = document.getElementById('chat');
        const txt = document.getElementById('txt');
        const file = document.getElementById('file');

        function add(h, k) {
            let d = document.createElement('div');
            d.className = 'msg ' + k;
            d.innerHTML = h;
            c.appendChild(d);
            c.scrollTop = c.scrollHeight;
        }

        // Función real para conectar con Gemini
        async function send() {
            let t = txt.value.trim();
            if (!t) return;
            
            add(t, 'user');
            txt.value = '';
            
            let x = document.createElement('div');
            x.className = 'msg ai';
            x.textContent = '⌛ Pensando...';
            c.appendChild(x);
            c.scrollTop = c.scrollHeight;

            try {
                // Hacemos la petición a la API de Google
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: t }] }]
                    })
                });

                if (!response.ok) throw new Error('Error en la conexión');

                const data = await response.json();
                
                // Extraemos el texto de la respuesta de Gemini
                const aiText = data.candidates[0].content.parts[0].text;
                
                x.remove();
                
                // Formateamos un poco el texto (saltos de línea)
                add(aiText.replace(/\n/g, '<br>'), 'ai');

            } catch (error) {
                x.remove();
                add('❌ Error: Revisa que tu API Key sea correcta o que tengas conexión.', 'ai');
                console.error(error);
            }
        }

        txt.onkeydown = e => {
            if(e.key == 'Enter' && !e.shiftKey){
                e.preventDefault();
                send();
            }
        }

        // Esta parte sigue mostrando las fotos en pantalla (aún no las envía a la IA)
        file.onchange = () => [...file.files].forEach(f => {
            let r = new FileReader();
            if(f.type.startsWith('image/')){
                r.onload = e => add("<div class=preview><img src='"+e.target.result+"'></div>", 'user');
                r.readAsDataURL(f);
            } else if(f.type.startsWith('video/')){
                r.onload = e => add("<div class=preview><video controls src='"+e.target.result+"'></video></div>", 'user');
                r.readAsDataURL(f);
            } else {
                add("📄 " + f.name, 'user');
            }
        });
    </script>
</body>
</html>
