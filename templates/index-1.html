<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>SOSI Antonio Ocampo</title><style>*{box-sizing:border-box}body{margin:0;background:#212121;color:#ececec;font-family:Arial}.chat{max-width:900px;height:100vh;margin:auto;display:flex;flex-direction:column}header{padding:18px;border-bottom:1px solid #333;text-align:center;font-weight:bold}#respuesta{flex:1;overflow:auto;padding:20px}.msg{max-width:80%;padding:14px 18px;border-radius:18px;margin:12px 0}.user{background:#303030;margin-left:auto}.bot{background:#444654}form{display:flex;padding:16px;border-top:1px solid #333;gap:10px}input{flex:1;background:#303030;color:#fff;border:none;border-radius:24px;padding:15px}button{width:56px;height:56px;border:none;border-radius:50%;background:#10a37f;color:#fff}.typing span{display:inline-block;width:8px;height:8px;background:#fff;border-radius:50%;margin:2px;animation:b 1.2s infinite}.typing span:nth-child(2){animation-delay:.2s}.typing span:nth-child(3){animation-delay:.4s}@keyframes b{0%,80%,100%{opacity:.2}40%{opacity:1}}</style></head><body><div class="chat"><header>✨ SOSI Antonio Ocampo</header><div id="respuesta"></div><form onsubmit="event.preventDefault();enviar();"><input id="mensaje" placeholder="Escribe un mensaje..."><button>➤</button></form></div><script>async function enviar(){const i=document.getElementById('mensaje');const t=i.value.trim();if(!t)return;const c=document.getElementById('respuesta');c.innerHTML+=`<div class="msg user">${t}</div><div id="load" class="msg bot typing"><span></span><span></span><span></span></div>`;c.scrollTop=c.scrollHeight;i.value='';try{const r=await fetch('/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({mensaje:t})});const d=await r.json();load.remove();c.innerHTML+=`<div class="msg bot">${d.respuesta}</div>`;}catch(e){if(document.getElementById('load'))load.remove();c.innerHTML+=`<div class="msg bot">Error al conectar.</div>`;}c.scrollTop=c.scrollHeight;}</script></body></html>
